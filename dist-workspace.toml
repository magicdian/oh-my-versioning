[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["npm"]
# Publish the npm package through a reusable workflow that uses npm Trusted
# Publishing/OIDC. Do not replace this with an NPM_TOKEN-based publish job.
publish-jobs = ["./npm-trusted-publish"]
# The custom npm publish job needs OIDC plus artifact access. There is
# intentionally no npm token permission or secret reference.
github-custom-job-permissions = { "npm-trusted-publish" = { "actions" = "read", "contents" = "read", "id-token" = "write" } }
# Publish under the magicdian npm scope.
npm-scope = "@magicdian"
# Target platforms to build apps for (Rust target-triple syntax)
targets = [
  "aarch64-apple-darwin",
  "aarch64-unknown-linux-gnu",
  "aarch64-pc-windows-msvc",
  "x86_64-apple-darwin",
  "x86_64-unknown-linux-gnu",
  "x86_64-pc-windows-msvc",
]
# Where to host releases
hosting = "github"
