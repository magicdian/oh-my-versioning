cli.help.title = "omv - 本地优先版本管理器"
cli.help.description = "统一管理 .omv 版本真相，并同步到语言清单与运行时导出文件。"
cli.help.usage.title = "用法："
cli.help.usage.value = "omv [命令] [--locale <en-US|zh-CN>]"
cli.help.commands.title = "命令："
cli.help.commands.init = "init      进入交互式初始化流程"
cli.help.commands.bump = "bump      计算下一个版本并同步所有启用目标"
cli.help.commands.plan = "plan      显示确定性目标同步计划但不写入文件"
cli.help.commands.sync = "sync      依据当前 .omv 状态同步清单与运行时导出"
cli.help.commands.current = "current   显示当前受管版本状态"
cli.help.commands.event = "event     记录自动化生命周期事件"
cli.help.commands.adapter = "adapter   安装和管理 agent/spec adapters"
cli.help.commands.integrate = "integrate 安装并检查宿主集成"
cli.help.commands.help = "help      显示帮助信息"
cli.help.commands.version = "version   显示当前 omv CLI 版本"
cli.help.options.title = "选项："
cli.help.options.help = "-h, --help        显示帮助信息"
cli.help.options.version = "-V, --version     显示当前版本"
cli.help.options.locale = "--locale <LOCALE> 覆盖本次运行语言（en-US 或 zh-CN）"
cli.help.options.no_ntp = "--no-ntp          本次运行跳过 NTP 校验"
cli.help.options.json = "--json            输出 JSON"
cli.help.options.output = "--output <MODE>   设置输出模式（text 或 json）"
cli.help.examples.title = "示例："
cli.help.examples.init = "omv init"
cli.help.examples.bump = "omv bump"
cli.help.examples.plan = "omv plan --json"
cli.help.examples.sync = "omv sync"
cli.help.examples.current = "omv current --json"
cli.help.examples.event = "omv event finalize-task --task-id task-1 --change-type bugfix --status done --tests passed --fingerprint task-1:v1 --source trellis-finish-work"
